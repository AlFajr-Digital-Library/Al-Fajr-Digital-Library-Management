<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>لوحة تحكم المشرفين - مكتبة الفجر الرقمية</title>
<link rel="icon" type="image/x-icon" href="img/Login library.jpg">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-analytics.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, updatePassword } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getDatabase, ref, set, get, child, update, push, onValue, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBlcKC2ncX9mTOPlhDOnfmyzdJ5mLinWYY",
    authDomain: "al-fajr-digital-library.firebaseapp.com",
    databaseURL: "https://al-fajr-digital-library-default-rtdb.firebaseio.com",
    projectId: "al-fajr-digital-library",
    storageBucket: "al-fajr-digital-library.firebasestorage.app",
    messagingSenderId: "739899495618",
    appId: "1:739899495618:web:8e60409193ec1408b4d75b",
    measurementId: "G-FFRQP9CXYK"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);
  const database = getDatabase(app);
  
  window.firebaseAuth = auth;
  window.firebaseDatabase = database;
  window.firebaseApp = app;
  
  window.firebase = {
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged,
    sendPasswordResetEmail,
    updatePassword,
    ref,
    set,
    get,
    child,
    update,
    push,
    onValue,
    remove,
    query,
    orderByChild,
    equalTo,
    getDatabase,
    getAuth
  };

  // ====== بيانات المشرف ======
  const ADMIN_CONFIG = {
    email: "hussain.alasari@alfajr.com",
    password: "Hussain@2024AlFajr#Secure",
    username: "Hussain AlAsari",
    role: "admin"
  };

  // ====== إنشاء حساب المشرف ======
  async function createDefaultAdmin() {
    console.log('🔄 جاري التحقق من وجود حساب المشرف...');

    try {
      const db = getDatabase();
      const usersRef = ref(db, 'users');
      const snapshot = await get(usersRef);
      
      let adminExists = false;
      let adminUID = null;
      
      if (snapshot.exists()) {
        snapshot.forEach((childSnapshot) => {
          const userData = childSnapshot.val();
          if (userData.role === 'admin' && userData.email === ADMIN_CONFIG.email) {
            adminExists = true;
            adminUID = childSnapshot.key;
          }
        });
      }

      if (!adminExists) {
        console.log('🆕 جاري إنشاء حساب المشرف...');
        
        try {
          const userCredential = await window.firebase.signInWithEmailAndPassword(auth, ADMIN_CONFIG.email, ADMIN_CONFIG.password);
          adminUID = userCredential.user.uid;
          
          await set(ref(db, 'users/' + adminUID), {
            email: ADMIN_CONFIG.email,
            username: ADMIN_CONFIG.username,
            role: ADMIN_CONFIG.role,
            status: 'active',
            createdAt: new Date().toISOString(),
            lastLogin: new Date().toISOString(),
            permissions: {
              manageUsers: true,
              manageNotifications: true,
              manageRecoveryCodes: true,
              manageSettings: true,
              deleteUsers: true,
              blockUsers: true,
              approveRequests: true
            }
          });

          console.log('✅ تم إنشاء حساب المشرف بنجاح!');
          await signOut(auth);
          
        } catch (createError) {
          if (createError.code === 'auth/email-already-in-use') {
            console.log('ℹ️ البريد الإلكتروني موجود مسبقاً في Authentication');
          } else {
            console.error('❌ خطأ في إنشاء حساب المشرف:', createError.code);
          }
        }
      } else {
        console.log('✅ حساب المشرف موجود بالفعل');
      }

      window.ADMIN_CONFIG = ADMIN_CONFIG;

    } catch (error) {
      console.error('❌ خطأ عام في دالة createDefaultAdmin:', error);
    }
  }

  createDefaultAdmin();
</script>

<style>
  :root {
    --primary: #6C5CE7;
    --primary-dark: #5A4BD1;
    --primary-light: #A29BFE;
    --secondary: #00CEC9;
    --gold: #FDCB6E;
    --bg-dark: #0a0a1a;
    --bg-card: #14142D;
    --bg-card-hover: #1E1E40;
    --bg-input: rgba(255, 255, 255, 0.06);
    --text-primary: #ffffff;
    --text-secondary: #b0b0c8;
    --success: #00B894;
    --error: #FF7675;
    --info: #74B9FF;
    --warning: #FDCB6E;
    --border: rgba(108, 92, 231, 0.2);
    --glow: 0 0 40px rgba(108, 92, 231, 0.15);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Cairo', 'Amiri', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    direction: rtl;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(0, 206, 201, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(253, 203, 110, 0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .particle {
    position: absolute;
    background: var(--primary);
    border-radius: 50%;
    opacity: 0.08;
    animation: float 20s infinite ease-in-out;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) translateX(0) scale(1); }
    25% { transform: translateY(-100px) translateX(50px) scale(1.2); }
    50% { transform: translateY(-50px) translateX(-30px) scale(0.8); }
    75% { transform: translateY(-150px) translateX(-20px) scale(1.1); }
  }

  /* ====== صفحة تسجيل الدخول ====== */
  .login-container {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
    background: var(--bg-dark);
  }

  .login-box {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    padding: 45px 40px;
    border-radius: 28px;
    box-shadow: 
      0 30px 60px rgba(0, 0, 0, 0.6),
      0 0 0 1px var(--border),
      var(--glow);
    width: 100%;
    max-width: 420px;
    text-align: center;
    position: relative;
    z-index: 1;
    border: 1px solid rgba(108, 92, 231, 0.1);
  }

  .login-box .logo {
    width: 85px;
    height: 85px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 30px rgba(108, 92, 231, 0.4);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .login-box .logo i {
    font-size: 36px;
    color: white;
  }

  .login-box h2 {
    margin-bottom: 5px;
    font-size: 26px;
    background: linear-gradient(135deg, var(--primary-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .login-box .subtitle {
    color: var(--text-secondary);
    font-size: 13px;
    margin-bottom: 25px;
  }

  .login-box .input-group {
    position: relative;
    margin-bottom: 15px;
  }

  .login-box .input-group i {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    font-size: 16px;
    z-index: 2;
    transition: color 0.3s;
  }

  .login-box .input-group:focus-within i {
    color: var(--primary-light);
  }

  .login-box input {
    width: 100%;
    padding: 14px 48px 14px 16px;
    background: var(--bg-input);
    border: 2px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    font-size: 15px;
    color: var(--text-primary);
    font-family: 'Cairo', sans-serif;
    transition: all 0.3s;
  }

  .login-box input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
  }

  .login-box input::placeholder {
    color: rgba(255, 255, 255, 0.3);
  }

  .login-box .login-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .login-box .login-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(108, 92, 231, 0.5);
  }

  .login-box .login-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .login-message {
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    animation: fadeIn 0.3s ease;
  }

  .login-message.error {
    background: rgba(255, 118, 117, 0.15);
    color: var(--error);
    border: 1px solid rgba(255, 118, 117, 0.2);
  }

  .login-message.success {
    background: rgba(0, 184, 148, 0.15);
    color: var(--success);
    border: 1px solid rgba(0, 184, 148, 0.2);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ====== المحتوى الرئيسي ====== */
  .main-content {
    flex: 1;
    padding: 80px 30px 30px;
    position: relative;
    z-index: 1;
    min-height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ====== الهيدر العلوي ====== */
  .top-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(20, 20, 45, 0.95);
    backdrop-filter: blur(15px);
    padding: 12px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    z-index: 50;
    height: 60px;
  }

  .top-header .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .top-header .brand i {
    font-size: 28px;
    background: linear-gradient(135deg, var(--primary-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .top-header .brand span {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .top-header .admin-info {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .top-header .admin-info .admin-name {
    color: var(--text-secondary);
    font-size: 14px;
  }

  .top-header .admin-info .admin-name i {
    color: var(--gold);
  }

  .notification-btn {
    position: relative;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .notification-btn:hover {
    background: rgba(108, 92, 231, 0.15);
    color: var(--primary-light);
    border-color: var(--primary);
    transform: scale(1.05);
  }

  .notification-btn .badge {
    position: absolute;
    top: -5px;
    right: -5px;
    background: var(--error);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 50%;
    min-width: 20px;
    text-align: center;
  }

  .logout-btn {
    background: rgba(255, 118, 117, 0.15);
    border: 1px solid rgba(255, 118, 117, 0.2);
    color: var(--error);
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .logout-btn:hover {
    background: rgba(255, 118, 117, 0.25);
  }

  /* ====== لوحة المعلومات ====== */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    flex-wrap: wrap;
    gap: 15px;
  }

  .page-header h1 {
    font-size: 24px;
    background: linear-gradient(135deg, var(--primary-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .page-header .date-time {
    color: var(--text-secondary);
    font-size: 14px;
  }

  /* ====== بطاقات الإحصائيات ====== */
  .stats-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    margin-bottom: 25px;
  }

  .stat-card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 18px 20px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.3s;
  }

  .stat-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--glow);
    border-color: rgba(108, 92, 231, 0.4);
  }

  .stat-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .stat-icon.purple { background: rgba(108, 92, 231, 0.2); color: var(--primary-light); }
  .stat-icon.green { background: rgba(0, 184, 148, 0.2); color: var(--success); }
  .stat-icon.gold { background: rgba(253, 203, 110, 0.2); color: var(--gold); }
  .stat-icon.red { background: rgba(255, 118, 117, 0.2); color: var(--error); }
  .stat-icon.blue { background: rgba(116, 185, 255, 0.2); color: var(--info); }

  .stat-info h4 {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }

  .stat-info p {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
  }

  /* ====== أقسام المستخدمين ====== */
  .users-section {
    margin-bottom: 25px;
  }

  .users-section .section-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .users-section .section-title h3 {
    font-size: 17px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .users-section .section-title .count {
    background: rgba(108, 92, 231, 0.15);
    color: var(--primary-light);
    padding: 2px 12px;
    border-radius: 20px;
    font-size: 13px;
  }

  .users-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 15px;
  }

  .user-card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border);
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .user-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--glow);
    border-color: rgba(108, 92, 231, 0.3);
  }

  .user-card .status-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .status-badge.approved { background: rgba(0, 184, 148, 0.2); color: var(--success); }
  .status-badge.pending { background: rgba(253, 203, 110, 0.2); color: var(--gold); }
  .status-badge.blocked { background: rgba(255, 118, 117, 0.2); color: var(--error); }
  .status-badge.review { background: rgba(116, 185, 255, 0.2); color: var(--info); }

  .user-card .user-info {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }

  .user-card .user-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .user-card .user-details h4 {
    font-size: 15px;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .user-card .user-details p {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .user-card .user-details .email {
    font-size: 12px;
    color: var(--text-secondary);
    opacity: 0.7;
  }

  .user-card .user-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
  }

  .user-card .user-meta .meta-item {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .user-card .user-meta .meta-item i {
    margin-left: 4px;
  }

  .user-card .user-actions {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .user-card .user-actions button {
    padding: 6px 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .btn-approve {
    background: rgba(0, 184, 148, 0.2);
    color: var(--success);
    border: 1px solid rgba(0, 184, 148, 0.3);
  }

  .btn-approve:hover {
    background: rgba(0, 184, 148, 0.3);
  }

  .btn-reject {
    background: rgba(255, 118, 117, 0.2);
    color: var(--error);
    border: 1px solid rgba(255, 118, 117, 0.3);
  }

  .btn-reject:hover {
    background: rgba(255, 118, 117, 0.3);
  }

  .btn-block {
    background: rgba(255, 118, 117, 0.15);
    color: var(--error);
    border: 1px solid rgba(255, 118, 117, 0.2);
  }

  .btn-block:hover {
    background: rgba(255, 118, 117, 0.25);
  }

  .btn-unblock {
    background: rgba(0, 184, 148, 0.2);
    color: var(--success);
    border: 1px solid rgba(0, 184, 148, 0.3);
  }

  .btn-unblock:hover {
    background: rgba(0, 184, 148, 0.3);
  }

  .btn-delete {
    background: rgba(255, 118, 117, 0.1);
    color: var(--error);
    border: 1px solid rgba(255, 118, 117, 0.15);
  }

  .btn-delete:hover {
    background: rgba(255, 118, 117, 0.2);
  }

  .btn-reset {
    background: rgba(253, 203, 110, 0.2);
    color: var(--gold);
    border: 1px solid rgba(253, 203, 110, 0.3);
  }

  .btn-reset:hover {
    background: rgba(253, 203, 110, 0.3);
  }

  .btn-view {
    background: rgba(116, 185, 255, 0.2);
    color: var(--info);
    border: 1px solid rgba(116, 185, 255, 0.3);
  }

  .btn-view:hover {
    background: rgba(116, 185, 255, 0.3);
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
    grid-column: 1 / -1;
  }

  .empty-state i {
    font-size: 40px;
    margin-bottom: 10px;
    opacity: 0.3;
  }

  .loading-spinner {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
    grid-column: 1 / -1;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid rgba(108, 92, 231, 0.15);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ====== نافذة الإشعارات ====== */
  .notifications-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    backdrop-filter: blur(8px);
  }

  .notifications-overlay.active {
    display: flex;
  }

  .notifications-panel {
    background: var(--bg-card);
    border-radius: 22px;
    padding: 30px;
    width: 90%;
    max-width: 700px;
    max-height: 80vh;
    border: 1px solid var(--border);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
    overflow-y: auto;
  }

  .notifications-panel .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid var(--border);
  }

  .notifications-panel .panel-header h3 {
    font-size: 20px;
    background: linear-gradient(135deg, var(--primary-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .notifications-panel .panel-header .close-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.3s;
  }

  .notifications-panel .panel-header .close-btn:hover {
    background: rgba(255, 118, 117, 0.2);
    color: var(--error);
  }

  .notification-item {
    padding: 15px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    margin-bottom: 5px;
    transition: background 0.3s;
  }

  .notification-item:hover {
    background: rgba(255, 255, 255, 0.03);
  }

  .notification-item.unread {
    background: rgba(253, 203, 110, 0.05);
    border-right: 3px solid var(--gold);
  }

  .notification-item .notif-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
  }

  .notification-item .notif-header .notif-title {
    font-weight: 600;
    color: var(--text-primary);
    font-size: 14px;
  }

  .notification-item .notif-header .notif-time {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .notification-item .notif-body {
    color: var(--text-secondary);
    font-size: 13px;
  }

  .notification-item .notif-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .notification-item .notif-actions button {
    padding: 4px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 11px;
    transition: all 0.3s;
  }

  /* ====== نافذة تأكيد ====== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    backdrop-filter: blur(8px);
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal {
    background: var(--bg-card);
    border-radius: 22px;
    padding: 35px;
    width: 90%;
    max-width: 500px;
    border: 1px solid var(--border);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
  }

  .modal h3 {
    margin-bottom: 15px;
    font-size: 20px;
    background: linear-gradient(135deg, var(--primary-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal p {
    color: var(--text-secondary);
    margin-bottom: 20px;
  }

  .modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  .modal-buttons button {
    padding: 10px 25px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s;
  }

  .modal-buttons .btn-confirm {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
  }

  .modal-buttons .btn-confirm:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(108, 92, 231, 0.3);
  }

  .modal-buttons .btn-cancel {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  .modal-buttons .btn-cancel:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  /* ====== توست ====== */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 28px;
    border-radius: 14px;
    color: white;
    font-weight: 600;
    z-index: 2000;
    animation: slideDown 0.5s ease;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  @keyframes slideDown {
    from { transform: translateX(-50%) translateY(-100px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }

  .toast.success { background: var(--success); }
  .toast.error { background: var(--error); }
  .toast.info { background: var(--info); color: #000; }
  .toast.warning { background: var(--warning); color: #000; }

  /* ====== تصفية ====== */
  .filter-controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 15px;
  }

  .filter-controls input {
    padding: 8px 16px;
    background: var(--bg-input);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    flex: 1;
    min-width: 150px;
  }

  .filter-controls input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .filter-controls input::placeholder {
    color: rgba(255, 255, 255, 0.3);
  }

  .filter-controls .filter-btn {
    padding: 8px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    transition: all 0.3s;
  }

  .filter-controls .filter-btn:hover {
    background: rgba(108, 92, 231, 0.1);
    color: var(--primary-light);
  }

  .filter-controls .filter-btn.active {
    background: rgba(108, 92, 231, 0.2);
    color: var(--primary-light);
    border-color: var(--primary);
  }

  @media (max-width: 768px) {
    .main-content {
      padding: 75px 15px 15px;
    }

    .top-header {
      padding: 10px 15px;
    }

    .top-header .brand span {
      font-size: 14px;
    }

    .top-header .admin-info .admin-name {
      display: none;
    }

    .users-grid {
      grid-template-columns: 1fr;
    }

    .stats-cards {
      grid-template-columns: repeat(2, 1fr);
    }

    .notifications-panel {
      padding: 20px;
      max-height: 90vh;
    }
  }

  @media (max-width: 480px) {
    .stats-cards {
      grid-template-columns: 1fr;
    }
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Amiri&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="particles" id="particles"></div>

<!-- صفحة تسجيل الدخول -->
<div class="login-container" id="loginContainer">
  <div class="login-box">
    <div class="logo">
      <i class="fas fa-shield-haltered"></i>
    </div>
    <h2>لوحة تحكم المشرفين</h2>
    <p class="subtitle">مكتبة الفجر الرقمية</p>
    
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="adminEmail" placeholder="البريد الإلكتروني للمشرف" />
    </div>
    
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="adminPassword" placeholder="كلمة المرور" />
    </div>
    
    <button class="login-btn" id="adminLoginBtn">
      <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
    </button>
    
    <div id="loginMessage"></div>
  </div>
</div>

<!-- الهيدر العلوي -->
<header class="top-header" id="topHeader" style="display: none;">
  <div class="brand">
    <i class="fas fa-shield-alt"></i>
    <span>لوحة التحكم</span>
  </div>
  
  <div class="admin-info">
    <span class="admin-name" id="adminNameDisplay"><i class="fas fa-user-cog"></i> المشرف</span>
    
    <button class="notification-btn" id="notificationBtn" title="الإشعارات">
      <i class="fas fa-bell"></i>
      <span class="badge" id="notifBadge">0</span>
    </button>
    
    <button class="logout-btn" onclick="handleLogout()">
      <i class="fas fa-sign-out-alt"></i> خروج
    </button>
  </div>
</header>

<!-- المحتوى الرئيسي -->
<main class="main-content" id="mainContent" style="display: none;">
  
  <div class="page-header">
    <h1><i class="fas fa-th-large"></i> لوحة المعلومات</h1>
    <span class="date-time" id="currentDateTime"></span>
  </div>
  
  <!-- بطاقات الإحصائيات -->
  <div class="stats-cards" id="statsCards">
    <div class="stat-card">
      <div class="stat-icon blue"><i class="fas fa-users"></i></div>
      <div class="stat-info">
        <h4>إجمالي المستخدمين</h4>
        <p id="totalUsers">0</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon gold"><i class="fas fa-clock"></i></div>
      <div class="stat-info">
        <h4>تحت المراجعة</h4>
        <p id="pendingUsers">0</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
      <div class="stat-info">
        <h4>تمت الموافقة</h4>
        <p id="approvedUsers">0</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red"><i class="fas fa-ban"></i></div>
      <div class="stat-info">
        <h4>محظور</h4>
        <p id="blockedUsers">0</p>
      </div>
    </div>
  </div>
  
  <!-- أزرار التصفية -->
  <div class="filter-controls">
    <input type="text" id="searchInput" placeholder="🔍 بحث عن مستخدم..." oninput="filterUsers()" />
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">الكل</button>
    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">⏳ تحت المراجعة</button>
    <button class="filter-btn" data-filter="approved" onclick="setFilter('approved')">✅ تمت الموافقة</button>
    <button class="filter-btn" data-filter="blocked" onclick="setFilter('blocked')">🚫 محظور</button>
  </div>
  
  <!-- قسم المستخدمين -->
  <div class="users-section">
    <div class="section-title">
      <h3><i class="fas fa-user-friends"></i> المستخدمين</h3>
      <span class="count" id="usersCount">0</span>
    </div>
    <div class="users-grid" id="usersGrid">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p>جاري تحميل المستخدمين...</p>
      </div>
    </div>
  </div>
  
</main>

<!-- نافذة الإشعارات -->
<div class="notifications-overlay" id="notificationsOverlay">
  <div class="notifications-panel">
    <div class="panel-header">
      <h3><i class="fas fa-bell"></i> الإشعارات</h3>
      <button class="close-btn" onclick="closeNotifications()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div id="notificationsList">
      <div class="empty-state">
        <i class="fas fa-bell-slash"></i>
        <p>لا توجد إشعارات</p>
      </div>
    </div>
  </div>
</div>

<!-- نافذة تأكيد -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3 id="confirmTitle">تأكيد الإجراء</h3>
    <p id="confirmMessage"></p>
    <div class="modal-buttons">
      <button class="btn-confirm" id="confirmYesBtn">تأكيد</button>
      <button class="btn-cancel" onclick="closeConfirmModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
// ====== بيانات المشرف (مخفية) ======
const ADMIN_EMAIL = "hussain.alasari@alfajr.com";
const ADMIN_PASSWORD = "Hussain@2024AlFajr#Secure";

// ====== المتغيرات العامة ======
let currentAdmin = null;
let allUsers = [];
let allNotifications = [];
let currentFilter = 'all';
let confirmCallback = null;

// ====== إنشاء الجسيمات ======
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  
  for (let i = 0; i < 25; i++) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    const size = Math.random() * 4 + 2;
    particle.style.width = size + 'px';
    particle.style.height = size + 'px';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.top = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 20 + 's';
    particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
    container.appendChild(particle);
  }
}

// ====== عرض رسالة توست ======
function showToast(message, type = 'info') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.5s';
    setTimeout(() => toast.remove(), 500);
  }, 3500);
}

// ====== تأكيد الإجراء ======
function showConfirm(title, message, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMessage').textContent = message;
  document.getElementById('confirmModal').classList.add('active');
  confirmCallback = callback;
}

function closeConfirmModal() {
  document.getElementById('confirmModal').classList.remove('active');
  confirmCallback = null;
}

// ====== تسجيل دخول المشرف ======
async function handleAdminLogin() {
  const email = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value;
  const loginMessage = document.getElementById('loginMessage');
  
  if (!email || !password) {
    loginMessage.innerHTML = '<div class="login-message error">الرجاء إدخال البريد الإلكتروني وكلمة المرور</div>';
    return;
  }
  
  const loginBtn = document.getElementById('adminLoginBtn');
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
  
  try {
    const userCredential = await window.firebase.signInWithEmailAndPassword(
      window.firebaseAuth,
      email,
      password
    );
    
    const user = userCredential.user;
    const db = window.firebaseDatabase;
    const userRef = window.firebase.ref(db, 'users/' + user.uid);
    const snapshot = await window.firebase.get(userRef);
    
    if (snapshot.exists() && snapshot.val().role === 'admin') {
      currentAdmin = {
        uid: user.uid,
        email: user.email,
        username: snapshot.val().username || 'المشرف'
      };
      
      localStorage.setItem('adminUser', JSON.stringify(currentAdmin));
      
      await window.firebase.update(userRef, {
        lastLogin: new Date().toISOString()
      });
      
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('topHeader').style.display = 'flex';
      document.getElementById('mainContent').style.display = 'block';
      
      document.getElementById('adminNameDisplay').innerHTML = 
        `<i class="fas fa-user-cog"></i> ${currentAdmin.username}`;
      
      loginMessage.innerHTML = '';
      showToast(`مرحباً بك ${currentAdmin.username}!`, 'success');
      loadAllData();
    } else {
      await window.firebase.signOut(window.firebaseAuth);
      loginMessage.innerHTML = '<div class="login-message error">غير مصرح لك بالدخول. هذا الحساب ليس حساب مشرف.</div>';
    }
  } catch (error) {
    let errorMsg = 'حدث خطأ في تسجيل الدخول';
    if (error.code === 'auth/user-not-found') errorMsg = 'البريد الإلكتروني غير مسجل';
    else if (error.code === 'auth/wrong-password') errorMsg = 'كلمة المرور غير صحيحة';
    else if (error.code === 'auth/invalid-credential') errorMsg = 'بيانات الدخول غير صحيحة';
    else if (error.code === 'auth/too-many-requests') errorMsg = 'تم تعطيل الحساب مؤقتاً لكثرة المحاولات';
    
    loginMessage.innerHTML = `<div class="login-message error">${errorMsg}</div>`;
  } finally {
    loginBtn.disabled = false;
    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
  }
}

// ====== تسجيل الخروج ======
async function handleLogout() {
  try {
    await window.firebase.signOut(window.firebaseAuth);
    localStorage.removeItem('adminUser');
    currentAdmin = null;
    document.getElementById('loginContainer').style.display = 'flex';
    document.getElementById('topHeader').style.display = 'none';
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('adminEmail').value = '';
    document.getElementById('adminPassword').value = '';
    showToast('تم تسجيل الخروج بنجاح', 'info');
  } catch (error) {
    showToast('حدث خطأ في تسجيل الخروج', 'error');
  }
}

// ====== إرسال إشعار ======
async function sendAdminNotification(type, data) {
  try {
    const db = window.firebaseDatabase;
    const notificationsRef = window.firebase.ref(db, 'adminNotifications');
    const newNotifRef = window.firebase.push(notificationsRef);
    
    const notification = {
      id: newNotifRef.key,
      type: type,
      userEmail: data.email || '',
      username: data.username || '',
      userId: data.userId || '',
      timestamp: new Date().toISOString(),
      read: false,
      action: data.action || '',
      details: data.details || ''
    };
    
    await window.firebase.set(newNotifRef, notification);
    return notification;
  } catch (error) {
    console.error('خطأ في إرسال الإشعار:', error);
    return null;
  }
}

// ====== تحديث الإحصائيات ======
function updateStats() {
  const regularUsers = allUsers.filter(u => u.role !== 'admin');
  const pending = regularUsers.filter(u => u.status === 'pending' || u.status === 'review');
  const approved = regularUsers.filter(u => u.status === 'active' || u.status === 'approved');
  const blocked = regularUsers.filter(u => u.status === 'blocked' || u.status === 'banned');
  
  document.getElementById('totalUsers').textContent = regularUsers.length;
  document.getElementById('pendingUsers').textContent = pending.length;
  document.getElementById('approvedUsers').textContent = approved.length;
  document.getElementById('blockedUsers').textContent = blocked.length;
  document.getElementById('usersCount').textContent = regularUsers.length;
}

// ====== تصفية المستخدمين ======
function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  renderUsers();
}

function filterUsers() {
  renderUsers();
}

// ====== عرض المستخدمين ======
function renderUsers() {
  const grid = document.getElementById('usersGrid');
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  
  let filtered = allUsers.filter(u => u.role !== 'admin');
  
  // تطبيق التصفية حسب الحالة
  if (currentFilter === 'pending') {
    filtered = filtered.filter(u => u.status === 'pending' || u.status === 'review');
  } else if (currentFilter === 'approved') {
    filtered = filtered.filter(u => u.status === 'active' || u.status === 'approved');
  } else if (currentFilter === 'blocked') {
    filtered = filtered.filter(u => u.status === 'blocked' || u.status === 'banned');
  }
  
  // تطبيق البحث
  if (searchTerm) {
    filtered = filtered.filter(u => 
      (u.username || '').toLowerCase().includes(searchTerm) ||
      (u.email || '').toLowerCase().includes(searchTerm)
    );
  }
  
  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-users-slash"></i>
        <p>لا يوجد مستخدمين ${currentFilter !== 'all' ? 'في هذا القسم' : ''}</p>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = filtered.map(user => {
    const status = user.status || 'pending';
    const statusClass = status === 'active' || status === 'approved' ? 'approved' :
                       status === 'blocked' || status === 'banned' ? 'blocked' :
                       status === 'review' ? 'review' : 'pending';
    
    const statusText = {
      'active': '✅ نشط',
      'approved': '✅ موافق عليه',
      'pending': '⏳ تحت المراجعة',
      'review': '🔍 مراجعة',
      'blocked': '🚫 محظور',
      'banned': '🚫 محظور'
    }[status] || '⏳ تحت المراجعة';
    
    const isBlocked = status === 'blocked' || status === 'banned';
    const isPending = status === 'pending' || status === 'review';
    const isApproved = status === 'active' || status === 'approved';
    
    const firstLetter = (user.username || user.email || 'U').charAt(0).toUpperCase();
    
    return `
      <div class="user-card" data-email="${user.email || ''}" data-username="${user.username || ''}">
        <span class="status-badge ${statusClass}">${statusText}</span>
        <div class="user-info">
          <div class="user-avatar">${firstLetter}</div>
          <div class="user-details">
            <h4>${user.username || 'غير محدد'}</h4>
            <p class="email">${user.email || ''}</p>
          </div>
        </div>
        <div class="user-meta">
          <span class="meta-item"><i class="fas fa-calendar-alt"></i> ${formatDate(user.createdAt)}</span>
          <span class="meta-item"><i class="fas fa-clock"></i> ${formatDate(user.lastLogin)}</span>
        </div>
        <div class="user-actions">
          ${isPending ? `
            <button class="btn-approve" onclick="approveUser('${user.uid}')">
              <i class="fas fa-check"></i> موافقة
            </button>
            <button class="btn-reject" onclick="rejectUser('${user.uid}')">
              <i class="fas fa-times"></i> رفض
            </button>
          ` : ''}
          ${isApproved ? `
            <button class="btn-block" onclick="blockUser('${user.uid}')">
              <i class="fas fa-ban"></i> حظر
            </button>
          ` : ''}
          ${isBlocked ? `
            <button class="btn-unblock" onclick="unblockUser('${user.uid}')">
              <i class="fas fa-unlock"></i> فك الحظر
            </button>
          ` : ''}
          <button class="btn-reset" onclick="resetPassword('${user.uid}')">
            <i class="fas fa-key"></i> إعادة تعيين
          </button>
          <button class="btn-delete" onclick="deleteUser('${user.uid}')">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
    `;
  }).join('');
}

// ====== تحميل جميع البيانات ======
function loadAllData() {
  const db = window.firebaseDatabase;
  
  // تحميل المستخدمين
  const usersRef = window.firebase.ref(db, 'users');
  window.firebase.onValue(usersRef, (snapshot) => {
    allUsers = [];
    
    if (snapshot.exists()) {
      snapshot.forEach((childSnapshot) => {
        const userData = childSnapshot.val();
        userData.uid = childSnapshot.key;
        allUsers.push(userData);
      });
    }
    
    updateStats();
    renderUsers();
  });
  
  // تحميل الإشعارات
  const notifRef = window.firebase.ref(db, 'adminNotifications');
  window.firebase.onValue(notifRef, (snapshot) => {
    allNotifications = [];
    let unreadCount = 0;
    
    if (snapshot.exists()) {
      snapshot.forEach((childSnapshot) => {
        const notifData = childSnapshot.val();
        notifData.id = childSnapshot.key;
        allNotifications.push(notifData);
        if (!notifData.read) unreadCount++;
      });
    }
    
    allNotifications.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    document.getElementById('notifBadge').textContent = unreadCount;
    document.getElementById('notifBadge').style.display = unreadCount > 0 ? 'block' : 'none';
  });
}

// ====== وظائف المستخدمين ======
async function approveUser(userId) {
  const user = allUsers.find(u => u.uid === userId);
  if (!user) return;
  
  showConfirm('✅ الموافقة على المستخدم', `هل أنت متأكد من الموافقة على ${user.username || user.email}؟`, async () => {
    try {
      const db = window.firebaseDatabase;
      const userRef = window.firebase.ref(db, 'users/' + userId);
      await window.firebase.update(userRef, {
        status: 'approved',
        approvedAt: new Date().toISOString(),
        approvedBy: currentAdmin?.email || 'admin'
      });
      
      await sendAdminNotification('user_approved', {
        email: user.email,
        username: user.username,
        action: 'تمت الموافقة على المستخدم',
        details: `تمت الموافقة على ${user.email} من قبل المشرف`
      });
      
      showToast(`✅ تمت الموافقة على ${user.username || user.email}`, 'success');
    } catch (error) {
      showToast('❌ حدث خطأ', 'error');
    }
  });
}

async function deleteUser(userId) {

  showConfirm('🗑️ حذف المستخدم', `هل أنت متأكد من حذف ${user.username || user.email}؟ هذا الإجراء لا يمكن التراجع عنه.`, async () => {

      const userRef = window.firebase.ref(db, 'users/' + userId);

// ====== الإشعارات ======
function openNotifications() {
  const overlay = document.getElementById('notificationsOverlay');
  overlay.classList.add('active');
  renderNotifications();
}

function closeNotifications() {
  document.getElementById('notificationsOverlay').classList.remove('active');
}

function renderNotifications() {
  const list = document.getElementById('notificationsList');
  
  if (allNotifications.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-bell-slash"></i>
        <p>لا توجد إشعارات</p>
      </div>
    `;
    return;
  }
  
  list.innerHTML = allNotifications.map(notif => `
    <div class="notification-item ${!notif.read ? 'unread' : ''}">
      <div class="notif-header">
        <span class="notif-title">${notif.action || 'إشعار'}</span>
        <span class="notif-time">${formatDate(notif.timestamp)}</span>
      </div>
      <div class="notif-body">${notif.details || ''}</div>
      <div class="notif-actions">
        ${!notif.read ? `<button class="btn-approve" onclick="markNotifRead('${notif.id}')">تعليم كمقروء</button>` : ''}
        <button class="btn-delete" onclick="deleteNotif('${notif.id}')">حذف</button>
      </div>
    </div>
  `).join('');
}

async function markNotifRead(notifId) {
  try {
    const db = window.firebaseDatabase;
    await window.firebase.update(window.firebase.ref(db, 'adminNotifications/' + notifId), {
      read: true
    });
    showToast('✅ تم تعليم الإشعار كمقروء', 'success');
  } catch (error) {
    showToast('❌ حدث خطأ', 'error');
  }
}

async function deleteNotif(notifId) {
  try {
    const db = window.firebaseDatabase;
    await window.firebase.remove(window.firebase.ref(db, 'adminNotifications/' + notifId));
    showToast('✅ تم حذف الإشعار', 'success');
  } catch (error) {
    showToast('❌ حدث خطأ', 'error');
  }
}

// ====== وظائف مساعدة ======
function formatDate(dateString) {
  if (!dateString) return 'غير محدد';
  const date = new Date(dateString);
  if (isNaN(date.getTime())) return 'غير محدد';
  
  return date.toLocaleDateString('ar-SA', {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

function updateDateTime() {
  const now = new Date();
  const el = document.getElementById('currentDateTime');
  if (el) {
    el.textContent = now.toLocaleDateString('ar-SA', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    });
  }
}

// ====== تهيئة الصفحة ======
function init() {
  createParticles();
  
  document.getElementById('topHeader').style.display = 'none';
  document.getElementById('mainContent').style.display = 'none';
  
  // التحقق من جلسة المشرف
  const savedAdmin = localStorage.getItem('adminUser');
  if (savedAdmin) {
    currentAdmin = JSON.parse(savedAdmin);
    
    window.firebase.onAuthStateChanged(window.firebaseAuth, (user) => {
      if (user && currentAdmin && user.email === currentAdmin.email) {
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('topHeader').style.display = 'flex';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('adminNameDisplay').innerHTML = 
          `<i class="fas fa-user-cog"></i> ${currentAdmin.username}`;
        loadAllData();
      } else {
        localStorage.removeItem('adminUser');
        document.getElementById('loginContainer').style.display = 'flex';
        document.getElementById('topHeader').style.display = 'none';
        document.getElementById('mainContent').style.display = 'none';
      }
    });
  }
  
  // مستمعي الأحداث
  document.getElementById('adminLoginBtn').addEventListener('click', handleAdminLogin);
  document.getElementById('adminPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleAdminLogin();
  });
  document.getElementById('adminEmail').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('adminPassword').focus();
  });
  
  document.getElementById('notificationBtn').addEventListener('click', openNotifications);
  document.getElementById('notificationsOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeNotifications();
  });
  
  document.getElementById('confirmYesBtn').addEventListener('click', () => {
    if (confirmCallback) confirmCallback();
    closeConfirmModal();
  });
  
  document.getElementById('confirmModal').addEventListener('click', function(e) {
    if (e.target === this) closeConfirmModal();
  });
  
  updateDateTime();
  setInterval(updateDateTime, 1000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
