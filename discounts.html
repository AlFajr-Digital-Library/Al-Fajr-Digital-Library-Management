<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة الخصومات</title>
<link rel="icon" type="image/x-icon" href="img/icon1.jpg">
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root {
  --netflix-red: #e50914;
  --netflix-dark: #141414;
  --netflix-gray: #222222;
  --netflix-light-gray: #757575;
  --netflix-white: #ffffff;
  --netflix-gradient: linear-gradient(to bottom, rgba(20,20,20,0.95) 0%, rgba(20,20,20,0.98) 100%);
  --shadow-heavy: 0 8px 25px rgba(0,0,0,0.7);
  --shadow-light: 0 4px 12px rgba(0,0,0,0.4);
  --transition-speed: 0.3s;
  --success-green: #4caf50;
  --warning-orange: #ff9800;
  --error-red: #f44336;
  --info-blue: #2196f3;
  --purple: #9c27b0;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Almarai', sans-serif;
  background-color: var(--netflix-dark);
  color: var(--netflix-white);
  min-height: 100vh;
}

/* ===== الهيدر ===== */
.admin-header {
  background: var(--netflix-gradient);
  padding: 20px 4%;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  box-shadow: var(--shadow-heavy);
}

.admin-header h1 {
  display: flex;
  align-items: center;
  gap: 15px;
  color: var(--netflix-white);
  font-size: 1.8em;
}

.admin-header h1 i {
  color: var(--netflix-red);
}

.admin-nav {
  display: flex;
  gap: 20px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.nav-btn {
  padding: 10px 20px;
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 25px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-btn:hover {
  background: var(--netflix-red);
  transform: translateY(-2px);
}

.nav-btn.active {
  background: var(--netflix-red);
  box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
}

/* ===== المحتوى الرئيسي ===== */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 30px 4%;
}

/* ===== قسم إنشاء الخصم ===== */
.create-discount-section {
  background: var(--netflix-gray);
  border-radius: 15px;
  padding: 30px;
  margin-bottom: 30px;
  border: 1px solid rgba(255,255,255,0.1);
}

.section-title {
  font-size: 1.5em;
  color: var(--netflix-white);
  margin-bottom: 25px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 15px;
  border-bottom: 2px solid var(--netflix-red);
}

.section-title i {
  color: var(--netflix-red);
}

/* ===== نموذج الخصم ===== */
.discount-form {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-group label {
  color: var(--netflix-light-gray);
  font-size: 0.9em;
  display: flex;
  align-items: center;
  gap: 5px;
}

.form-group label i {
  color: var(--netflix-red);
  font-size: 0.8em;
}

.form-group input,
.form-group select,
.form-group textarea {
  padding: 12px 15px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color: var(--netflix-white);
  font-size: 1em;
  transition: all 0.3s ease;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--netflix-red);
  box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.1);
}

.form-group.full-width {
  grid-column: 1 / -1;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

/* ===== أزرار النموذج ===== */
.form-actions {
  grid-column: 1 / -1;
  display: flex;
  gap: 15px;
  justify-content: flex-end;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.btn {
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 1em;
}

.btn-primary {
  background: linear-gradient(45deg, var(--netflix-red), #ff416c);
  color: white;
}

.btn-primary:hover {
  background: linear-gradient(45deg, #ff416c, var(--netflix-red));
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3);
}

.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.2);
  transform: translateY(-2px);
}

.btn-success {
  background: linear-gradient(45deg, var(--success-green), #45a049);
  color: white;
}

.btn-success:hover {
  background: linear-gradient(45deg, #45a049, var(--success-green));
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(76, 175, 80, 0.3);
}

/* ===== قائمة الخصومات ===== */
.discounts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 25px;
  margin-top: 30px;
}

.discount-card {
  background: linear-gradient(135deg, var(--netflix-gray), #2a2a2a);
  border-radius: 15px;
  padding: 25px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}

.discount-card:hover {
  transform: translateY(-5px);
  border-color: var(--netflix-red);
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}

.discount-card::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(45deg, transparent 30%, rgba(229, 9, 20, 0.05) 50%, transparent 70%);
  transform: translateX(-100%);
}

.discount-card:hover::before {
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  100% { transform: translateX(100%); }
}

.discount-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
}

.discount-code {
  background: linear-gradient(45deg, var(--success-green), #45a049);
  color: white;
  padding: 8px 15px;
  border-radius: 20px;
  font-size: 1.2em;
  font-weight: 700;
  letter-spacing: 1px;
}

.discount-status {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.9em;
  padding: 4px 10px;
  border-radius: 12px;
}

.status-active {
  background: rgba(76, 175, 80, 0.2);
  color: var(--success-green);
  border: 1px solid rgba(76, 175, 80, 0.4);
}

.status-expired {
  background: rgba(244, 67, 54, 0.2);
  color: var(--error-red);
  border: 1px solid rgba(244, 67, 54, 0.4);
}

.status-inactive {
  background: rgba(255, 152, 0, 0.2);
  color: var(--warning-orange);
  border: 1px solid rgba(255, 152, 0, 0.4);
}

.discount-details {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.discount-detail {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.detail-label {
  color: var(--netflix-light-gray);
  font-size: 0.85em;
}

.detail-value {
  color: var(--netflix-white);
  font-weight: 600;
  font-size: 1.1em;
}

.discount-percentage {
  color: var(--success-green);
  font-size: 1.4em;
  font-weight: 700;
}

.discount-type {
  background: rgba(33, 150, 243, 0.2);
  color: var(--info-blue);
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 0.85em;
}

.discount-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
  margin-top: 20px;
}

.discount-users {
  display: flex;
  align-items: center;
  gap: 5px;
  color: var(--netflix-light-gray);
  font-size: 0.9em;
}

.discount-actions {
  display: flex;
  gap: 8px;
}

.action-btn {
  background: none;
  border: none;
  color: var(--netflix-light-gray);
  cursor: pointer;
  padding: 8px;
  border-radius: 5px;
  transition: all 0.3s ease;
}

.action-btn:hover {
  background: rgba(255,255,255,0.1);
  color: var(--netflix-white);
}

.action-btn.edit:hover {
  color: var(--info-blue);
}

.action-btn.delete:hover {
  color: var(--error-red);
}

.action-btn.toggle:hover {
  color: var(--success-green);
}

/* ===== خيارات المستخدمين ===== */
.users-selection {
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  padding: 20px;
  margin-top: 20px;
}

.users-list {
  max-height: 200px;
  overflow-y: auto;
  margin-top: 15px;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
}

.user-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  border-radius: 5px;
  transition: all 0.3s ease;
}

.user-item:hover {
  background: rgba(255,255,255,0.1);
}

.user-item input[type="checkbox"] {
  width: 18px;
  height: 18px;
}

.user-email {
  color: var(--netflix-white);
  font-size: 0.9em;
}

/* ===== الإحصائيات ===== */
.stats-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.stat-card {
  background: linear-gradient(135deg, var(--netflix-gray), #2a2a2a);
  border-radius: 15px;
  padding: 25px 20px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.3s ease;
}

.stat-card:hover {
  transform: translateY(-3px);
  border-color: var(--netflix-red);
  box-shadow: var(--shadow-light);
}

.stat-icon {
  font-size: 2.5em;
  margin-bottom: 15px;
}

.stat-icon.active {
  color: var(--success-green);
}

.stat-icon.expired {
  color: var(--error-red);
}

.stat-icon.total {
  color: var(--netflix-red);
}

.stat-value {
  font-size: 2em;
  font-weight: 700;
  color: var(--netflix-white);
  margin-bottom: 5px;
}

.stat-label {
  color: var(--netflix-light-gray);
  font-size: 0.9em;
}

/* ===== النوافذ المنبثقة ===== */
.modal {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.9);
  z-index: 10000;
  padding: 20px;
}

.modal-content {
  background: var(--netflix-gray);
  border-radius: 20px;
  padding: 30px;
  max-width: 600px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-heavy);
  border: 1px solid rgba(255,255,255,0.1);
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(50px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--netflix-red);
}

.modal-title {
  font-size: 1.5em;
  color: var(--netflix-white);
  display: flex;
  align-items: center;
  gap: 10px;
}

.close-modal {
  background: none;
  border: none;
  color: var(--netflix-light-gray);
  font-size: 1.5em;
  cursor: pointer;
  transition: all 0.3s ease;
}

.close-modal:hover {
  color: var(--netflix-red);
  transform: rotate(90deg);
}

/* ===== صندوق الرسائل ===== */
.message-box {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  min-width: 300px;
  max-width: 500px;
  padding: 15px 20px;
  border-radius: 10px;
  box-shadow: var(--shadow-heavy);
  display: none;
  opacity: 0;
  z-index: 10001;
  text-align: center;
  font-weight: 600;
  color: white;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from { transform: translate(-50%, -20px); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}

.message-box.show {
  display: block;
  opacity: 1;
}

.message-success {
  background: linear-gradient(135deg, rgba(46, 204, 113, 0.9), rgba(39, 174, 96, 0.9));
}

.message-error {
  background: linear-gradient(135deg, rgba(231, 76, 60, 0.9), rgba(192, 57, 43, 0.9));
}

.message-warning {
  background: linear-gradient(135deg, rgba(241, 196, 15, 0.9), rgba(243, 156, 18, 0.9));
}

/* ===== التصميم المتجاوب ===== */
@media(max-width: 768px) {
  .container {
    padding: 20px 3%;
  }
  
  .discount-form {
    grid-template-columns: 1fr;
  }
  
  .form-row {
    grid-template-columns: 1fr;
  }
  
  .discounts-grid {
    grid-template-columns: 1fr;
  }
  
  .admin-nav {
    flex-direction: column;
  }
  
  .nav-btn {
    width: 100%;
    justify-content: center;
  }
  
  .modal-content {
    padding: 20px 15px;
  }
}

@media(max-width: 480px) {
  .discount-header {
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
  }
  
  .discount-details {
    grid-template-columns: 1fr;
  }
  
  .discount-footer {
    flex-direction: column;
    gap: 15px;
    align-items: stretch;
  }
  
  .discount-actions {
    justify-content: center;
  }
}
</style>
</head>
<body>

<div class="admin-header">
  <h1><i class="fas fa-tags"></i> إدارة الخصومات</h1>
  
  <div class="admin-nav">
    <button class="nav-btn active" onclick="showSection('create')">
      <i class="fas fa-plus-circle"></i> إنشاء خصم جديد
    </button>
    <button class="nav-btn" onclick="showSection('list')">
      <i class="fas fa-list"></i> قائمة الخصومات
    </button>
    <button class="nav-btn" onclick="showSection('stats')">
      <i class="fas fa-chart-bar"></i> الإحصائيات
    </button>
    <button class="nav-btn" onclick="window.location.href='basket.html'">
      <i class="fas fa-shopping-basket"></i> العودة للسلة
    </button>
  </div>
</div>

<div class="container">
  <!-- قسم إنشاء الخصم -->
  <div id="createSection" class="create-discount-section">
    <h2 class="section-title"><i class="fas fa-plus-circle"></i> إنشاء خصم جديد</h2>
    
    <form id="discountForm" class="discount-form">
      <!-- المعلومات الأساسية -->
      <div class="form-group">
        <label for="discountCode"><i class="fas fa-tag"></i> كود الخصم *</label>
        <input type="text" id="discountCode" placeholder="مثال: SAVE20" required maxlength="20">
      </div>
      
      <div class="form-group">
        <label for="discountName"><i class="fas fa-heading"></i> اسم الخصم *</label>
        <input type="text" id="discountName" placeholder="خصم الصيف، عيد الفطر..." required>
      </div>
      
      <div class="form-group">
        <label for="discountType"><i class="fas fa-percentage"></i> نوع الخصم *</label>
        <select id="discountType" required onchange="toggleDiscountFields()">
          <option value="">اختر نوع الخصم</option>
          <option value="percentage">نسبة مئوية</option>
          <option value="fixed">مبلغ ثابت</option>
          <option value="free_shipping">شحن مجاني</option>
          <option value="balance">رصيد إضافي</option>
        </select>
      </div>
      
      <!-- القيمة -->
      <div class="form-row">
        <div class="form-group" id="percentageField" style="display: none;">
          <label for="discountPercentage"><i class="fas fa-percent"></i> نسبة الخصم %</label>
          <input type="number" id="discountPercentage" min="1" max="100" step="1" placeholder="10">
        </div>
        
        <div class="form-group" id="amountField" style="display: none;">
          <label for="discountAmount"><i class="fas fa-money-bill-wave"></i> مبلغ الخصم (ر.س)</label>
          <input type="number" id="discountAmount" min="1" step="0.01" placeholder="50.00">
        </div>
        
        <div class="form-group" id="balanceField" style="display: none;">
          <label for="balanceAmount"><i class="fas fa-wallet"></i> مبلغ الرصيد الإضافي (ر.س)</label>
          <input type="number" id="balanceAmount" min="1" step="0.01" placeholder="100.00">
        </div>
      </div>
      
      <!-- الشروط -->
      <div class="form-row">
        <div class="form-group">
          <label for="minPurchase"><i class="fas fa-shopping-cart"></i> الحد الأدنى للشراء (ر.س)</label>
          <input type="number" id="minPurchase" min="0" step="0.01" placeholder="0.00">
        </div>
        
        <div class="form-group">
          <label for="maxUses"><i class="fas fa-redo"></i> أقصى عدد مرات الاستخدام</label>
          <input type="number" id="maxUses" min="1" placeholder="غير محدود">
        </div>
      </div>
      
      <!-- الصلاحية -->
      <div class="form-row">
        <div class="form-group">
          <label for="startDate"><i class="fas fa-calendar-plus"></i> تاريخ البدء</label>
          <input type="date" id="startDate">
        </div>
        
        <div class="form-group">
          <label for="expiryDate"><i class="fas fa-calendar-times"></i> تاريخ الانتهاء</label>
          <input type="date" id="expiryDate">
        </div>
      </div>
      
      <!-- المستهدفون -->
      <div class="form-group">
        <label for="targetType"><i class="fas fa-users"></i> الفئة المستهدفة *</label>
        <select id="targetType" required onchange="toggleUsersSelection()">
          <option value="all">جميع المستخدمين</option>
          <option value="specific">مستخدمين محددين</option>
          <option value="single">مستخدم واحد فقط</option>
          <option value="count">عدد محدد من المستخدمين</option>
        </select>
      </div>
      
      <!-- اختيار المستخدمين -->
      <div id="usersSelection" class="users-selection" style="display: none;">
        <label><i class="fas fa-user-check"></i> اختيار المستخدمين</label>
        <div class="users-list" id="usersList">
          <!-- سيتم ملؤها ديناميكياً -->
        </div>
      </div>
      
      <!-- عدد المستخدمين -->
      <div class="form-group" id="userCountField" style="display: none;">
        <label for="userCount"><i class="fas fa-user-friends"></i> عدد المستخدمين المسموح لهم</label>
        <input type="number" id="userCount" min="1" placeholder="10">
      </div>
      
      <!-- المنتجات -->
      <div class="form-group">
        <label for="productScope"><i class="fas fa-box"></i> نطاق التطبيق</label>
        <select id="productScope">
          <option value="all">جميع المنتجات</option>
          <option value="specific">منتجات محددة</option>
          <option value="category">فئة معينة</option>
          <option value="digital">المنتجات الرقمية فقط</option>
          <option value="physical">المنتجات الورقية فقط</option>
        </select>
      </div>
      
      <!-- الوصف -->
      <div class="form-group full-width">
        <label for="discountDescription"><i class="fas fa-file-alt"></i> وصف الخصم</label>
        <textarea id="discountDescription" rows="3" placeholder="وصف مفصل عن الخصم وشروطه..."></textarea>
      </div>
      
      <!-- حالة الخصم -->
      <div class="form-group">
        <label for="isActive">
          <input type="checkbox" id="isActive" checked>
          <span>تفعيل الخصم فوراً</span>
        </label>
      </div>
      
      <!-- أزرار الإرسال -->
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" onclick="resetForm()">
          <i class="fas fa-redo"></i> إعادة تعيين
        </button>
        <button type="submit" class="btn btn-success">
          <i class="fas fa-save"></i> حفظ الخصم
        </button>
      </div>
    </form>
  </div>
  
  <!-- قسم قائمة الخصومات -->
  <div id="listSection" class="create-discount-section" style="display: none;">
    <h2 class="section-title"><i class="fas fa-list"></i> قائمة الخصومات</h2>
    
    <div class="discounts-grid" id="discountsList">
      <!-- سيتم ملؤها ديناميكياً -->
    </div>
  </div>
  
  <!-- قسم الإحصائيات -->
  <div id="statsSection" class="create-discount-section" style="display: none;">
    <h2 class="section-title"><i class="fas fa-chart-bar"></i> إحصائيات الخصومات</h2>
    
    <div class="stats-cards">
      <div class="stat-card">
        <div class="stat-icon total"><i class="fas fa-tags"></i></div>
        <div class="stat-value" id="totalDiscounts">0</div>
        <div class="stat-label">إجمالي الخصومات</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon active"><i class="fas fa-check-circle"></i></div>
        <div class="stat-value" id="activeDiscounts">0</div>
        <div class="stat-label">خصومات نشطة</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon expired"><i class="fas fa-times-circle"></i></div>
        <div class="stat-value" id="expiredDiscounts">0</div>
        <div class="stat-label">خصومات منتهية</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div class="stat-value" id="totalUses">0</div>
        <div class="stat-label">إجمالي مرات الاستخدام</div>
      </div>
    </div>
    
    <h3 style="color: var(--netflix-white); margin: 30px 0 15px 0;">
      <i class="fas fa-fire"></i> الخصومات الأكثر استخداماً
    </h3>
    
    <div id="topDiscounts">
      <!-- سيتم ملؤها ديناميكياً -->
    </div>
  </div>
</div>

<!-- نافذة تعديل الخصم -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title"><i class="fas fa-edit"></i> تعديل الخصم</h3>
      <button class="close-modal" onclick="closeEditModal()">×</button>
    </div>
    
    <form id="editDiscountForm">
      <!-- سيتم ملؤها ديناميكياً -->
    </form>
  </div>
</div>

<!-- نافذة تفاصيل الخصم -->
<div id="detailsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title"><i class="fas fa-info-circle"></i> تفاصيل الخصم</h3>
      <button class="close-modal" onclick="closeDetailsModal()">×</button>
    </div>
    
    <div id="discountDetails">
      <!-- سيتم ملؤها ديناميكياً -->
    </div>
  </div>
</div>

<!-- صندوق الرسائل -->
<div id="messageBox" class="message-box"></div>

<script>
// ====== التهيئة الأساسية ======
const DISCOUNTS_KEY = 'admin_discounts';
let discounts = JSON.parse(localStorage.getItem(DISCOUNTS_KEY)) || [];
let allUsers = JSON.parse(localStorage.getItem('registered_users') || '[]');
let editingDiscountId = null;

// ====== وظائف المساعدة ======
function showMessage(msg, type = 'success', duration = 4000) {
  const messageBox = document.getElementById('messageBox');
  messageBox.textContent = msg;
  messageBox.className = `message-box message-${type} show`;
  setTimeout(() => messageBox.classList.remove('show'), duration);
}

function showSection(sectionId) {
  // إخفاء جميع الأقسام
  document.getElementById('createSection').style.display = 'none';
  document.getElementById('listSection').style.display = 'none';
  document.getElementById('statsSection').style.display = 'none';
  
  // إزالة النشاط من جميع الأزرار
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  
  // إظهار القسم المطلوب
  document.getElementById(sectionId + 'Section').style.display = 'block';
  
  // تفعيل الزر المناسب
  document.querySelector(`button[onclick="showSection('${sectionId}')"]`).classList.add('active');
  
  // تحديث المحتوى إذا لزم
  if (sectionId === 'list') {
    renderDiscountsList();
  } else if (sectionId === 'stats') {
    updateStats();
  }
}

// ====== وظائف النموذج ======
function toggleDiscountFields() {
  const type = document.getElementById('discountType').value;
  
  // إخفاء جميع الحقول أولاً
  document.getElementById('percentageField').style.display = 'none';
  document.getElementById('amountField').style.display = 'none';
  document.getElementById('balanceField').style.display = 'none';
  
  // إظهار الحقل المناسب
  if (type === 'percentage') {
    document.getElementById('percentageField').style.display = 'block';
    document.getElementById('discountPercentage').required = true;
  } else if (type === 'fixed') {
    document.getElementById('amountField').style.display = 'block';
    document.getElementById('discountAmount').required = true;
  } else if (type === 'balance') {
    document.getElementById('balanceField').style.display = 'block';
    document.getElementById('balanceAmount').required = true;
  }
}

function toggleUsersSelection() {
  const targetType = document.getElementById('targetType').value;
  const usersSelection = document.getElementById('usersSelection');
  const userCountField = document.getElementById('userCountField');
  
  usersSelection.style.display = 'none';
  userCountField.style.display = 'none';
  
  if (targetType === 'specific') {
    usersSelection.style.display = 'block';
    loadUsersList();
  } else if (targetType === 'count') {
    userCountField.style.display = 'block';
  }
}

function loadUsersList() {
  const usersList = document.getElementById('usersList');
  usersList.innerHTML = '';
  
  allUsers.forEach(user => {
    const userDiv = document.createElement('div');
    userDiv.className = 'user-item';
    userDiv.innerHTML = `
      <input type="checkbox" id="user_${user.email}" value="${user.email}">
      <label for="user_${user.email}" class="user-email">
        <i class="fas fa-user"></i> ${user.username || 'مستخدم'} (${user.email})
      </label>
    `;
    usersList.appendChild(userDiv);
  });
}

// ====== حفظ الخصم ======
document.getElementById('discountForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const discountCode = document.getElementById('discountCode').value.trim().toUpperCase();
  const discountName = document.getElementById('discountName').value.trim();
  const discountType = document.getElementById('discountType').value;
  const targetType = document.getElementById('targetType').value;
  const productScope = document.getElementById('productScope').value;
  const description = document.getElementById('discountDescription').value.trim();
  const isActive = document.getElementById('isActive').checked;
  
  // التحقق من التكرار
  const existingDiscount = discounts.find(d => d.code === discountCode);
  if (existingDiscount && !editingDiscountId) {
    showMessage('كود الخصم موجود مسبقاً', 'error');
    return;
  }
  
  // جمع بيانات الخصم
  const discount = {
    id: editingDiscountId || 'discount_' + Date.now(),
    code: discountCode,
    name: discountName,
    type: discountType,
    targetType: targetType,
    productScope: productScope,
    description: description,
    isActive: isActive,
    createdAt: new Date().toISOString(),
    usedCount: editingDiscountId ? discounts.find(d => d.id === editingDiscountId)?.usedCount || 0 : 0
  };
  
  // إضافة القيمة حسب النوع
  if (discountType === 'percentage') {
    const percentage = parseInt(document.getElementById('discountPercentage').value);
    if (percentage < 1 || percentage > 100) {
      showMessage('نسبة الخصم يجب أن تكون بين 1 و 100', 'error');
      return;
    }
    discount.percentage = percentage;
  } else if (discountType === 'fixed') {
    const amount = parseFloat(document.getElementById('discountAmount').value);
    if (amount <= 0) {
      showMessage('مبلغ الخصم يجب أن يكون أكبر من صفر', 'error');
      return;
    }
    discount.amount = amount;
  } else if (discountType === 'balance') {
    const balance = parseFloat(document.getElementById('balanceAmount').value);
    if (balance <= 0) {
      showMessage('مبلغ الرصيد يجب أن يكون أكبر من صفر', 'error');
      return;
    }
    discount.balanceAmount = balance;
  }
  
  // الشروط
  const minPurchase = parseFloat(document.getElementById('minPurchase').value) || 0;
  if (minPurchase < 0) {
    showMessage('الحد الأدنى للشراء لا يمكن أن يكون سالباً', 'error');
    return;
  }
  discount.minPurchase = minPurchase;
  
  const maxUses = parseInt(document.getElementById('maxUses').value) || null;
  if (maxUses !== null && maxUses < 1) {
    showMessage('أقصى عدد مرات الاستخدام يجب أن يكون 1 على الأقل', 'error');
    return;
  }
  discount.maxUses = maxUses;
  
  // الصلاحية
  const startDate = document.getElementById('startDate').value;
  const expiryDate = document.getElementById('expiryDate').value;
  
  if (startDate) {
    discount.startDate = startDate;
  }
  
  if (expiryDate) {
    discount.expiryDate = expiryDate;
    
    // التحقق من أن تاريخ الانتهاء ليس قبل تاريخ البدء
    if (startDate && new Date(expiryDate) < new Date(startDate)) {
      showMessage('تاريخ الانتهاء يجب أن يكون بعد تاريخ البدء', 'error');
      return;
    }
  }
  
  // المستخدمين المحددين
  if (targetType === 'specific') {
    const selectedUsers = [];
    document.querySelectorAll('#usersList input[type="checkbox"]:checked').forEach(checkbox => {
      selectedUsers.push(checkbox.value);
    });
    
    if (selectedUsers.length === 0) {
      showMessage('يرجى اختيار مستخدم واحد على الأقل', 'error');
      return;
    }
    
    discount.targetUsers = selectedUsers;
  } else if (targetType === 'single') {
    discount.maxUsers = 1;
  } else if (targetType === 'count') {
    const userCount = parseInt(document.getElementById('userCount').value);
    if (userCount < 1) {
      showMessage('يرجى إدخال عدد صحيح موجب', 'error');
      return;
    }
    discount.maxUsers = userCount;
    discount.usedUsers = [];
  }
  
  // حفظ أو تحديث الخصم
  if (editingDiscountId) {
    const index = discounts.findIndex(d => d.id === editingDiscountId);
    if (index !== -1) {
      discounts[index] = discount;
      showMessage('تم تحديث الخصم بنجاح', 'success');
    }
  } else {
    discounts.push(discount);
    showMessage('تم إنشاء الخصم بنجاح', 'success');
  }
  
  localStorage.setItem(DISCOUNTS_KEY, JSON.stringify(discounts));
  resetForm();
  renderDiscountsList();
});

function resetForm() {
  document.getElementById('discountForm').reset();
  editingDiscountId = null;
  toggleDiscountFields();
  toggleUsersSelection();
}

// ====== عرض قائمة الخصومات ======
function renderDiscountsList() {
  const container = document.getElementById('discountsList');
  
  if (discounts.length === 0) {
    container.innerHTML = `
      <div style="text-align: center; padding: 40px 20px; color: var(--netflix-light-gray); grid-column: 1 / -1;">
        <i class="fas fa-tags" style="font-size: 48px; margin-bottom: 15px; opacity: 0.5;"></i>
        <h3 style="color: var(--netflix-white); margin-bottom: 10px;">لا توجد خصومات</h3>
        <p>قم بإنشاء خصم جديد باستخدام الزر "إنشاء خصم جديد"</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = discounts.map(discount => {
    const isExpired = discount.expiryDate && new Date(discount.expiryDate) < new Date();
    const isActive = discount.isActive && !isExpired;
    
    let statusText = 'نشط';
    let statusClass = 'status-active';
    
    if (!discount.isActive) {
      statusText = 'غير مفعل';
      statusClass = 'status-inactive';
    } else if (isExpired) {
      statusText = 'منتهي';
      statusClass = 'status-expired';
    }
    
    // حساب النسبة المئوية للاستخدام
    let usagePercentage = 0;
    if (discount.maxUses) {
      usagePercentage = Math.round((discount.usedCount / discount.maxUses) * 100);
    }
    
    // عرض القيمة
    let valueDisplay = '';
    if (discount.type === 'percentage') {
      valueDisplay = `<div class="discount-percentage">${discount.percentage}%</div>`;
    } else if (discount.type === 'fixed') {
      valueDisplay = `<div class="detail-value">${discount.amount} ر.س</div>`;
    } else if (discount.type === 'balance') {
      valueDisplay = `<div class="detail-value" style="color: var(--info-blue);">+${discount.balanceAmount} ر.س رصيد</div>`;
    } else if (discount.type === 'free_shipping') {
      valueDisplay = `<div class="detail-value" style="color: var(--success-green);"><i class="fas fa-truck"></i> شحن مجاني</div>`;
    }
    
    return `
      <div class="discount-card">
        <div class="discount-header">
          <div class="discount-code">${discount.code}</div>
          <div class="discount-status ${statusClass}">
            <i class="fas fa-circle" style="font-size: 0.6em;"></i>
            ${statusText}
          </div>
        </div>
        
        <div class="discount-details">
          <div class="discount-detail">
            <div class="detail-label">الاسم</div>
            <div class="detail-value">${discount.name}</div>
          </div>
          
          <div class="discount-detail">
            <div class="detail-label">القيمة</div>
            ${valueDisplay}
          </div>
          
          <div class="discount-detail">
            <div class="detail-label">الفئة</div>
            <div class="discount-type">
              ${getTargetTypeText(discount.targetType)}
            </div>
          </div>
          
          <div class="discount-detail">
            <div class="detail-label">الاستخدام</div>
            <div class="detail-value">
              ${discount.usedCount || 0} / ${discount.maxUses || '∞'}
            </div>
          </div>
        </div>
        
        <div class="discount-detail">
          <div class="detail-label">الوصف</div>
          <div class="detail-value" style="color: var(--netflix-light-gray); font-size: 0.9em; line-height: 1.4;">
            ${discount.description || 'لا يوجد وصف'}
          </div>
        </div>
        
        <div class="discount-footer">
          <div class="discount-users">
            <i class="fas fa-users"></i>
            ${getUsersCountText(discount)}
          </div>
          
          <div class="discount-actions">
            <button class="action-btn edit" onclick="editDiscount('${discount.id}')" title="تعديل">
              <i class="fas fa-edit"></i>
            </button>
            <button class="action-btn toggle" onclick="toggleDiscount('${discount.id}')" title="${isActive ? 'تعطيل' : 'تفعيل'}">
              <i class="fas fa-power-off"></i>
            </button>
            <button class="action-btn" onclick="viewDiscountDetails('${discount.id}')" title="تفاصيل">
              <i class="fas fa-info-circle"></i>
            </button>
            <button class="action-btn delete" onclick="deleteDiscount('${discount.id}')" title="حذف">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
        
        ${discount.maxUses ? `
        <div style="margin-top: 15px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span style="color: var(--netflix-light-gray); font-size: 0.85em;">نسبة الاستخدام</span>
            <span style="color: var(--netflix-white); font-weight: 600; font-size: 0.85em;">${usagePercentage}%</span>
          </div>
          <div style="height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;">
            <div style="height: 100%; width: ${Math.min(usagePercentage, 100)}%; background: linear-gradient(45deg, var(--success-green), #45a049);"></div>
          </div>
        </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

function getTargetTypeText(type) {
  const types = {
    'all': 'الجميع',
    'specific': 'مستخدمين محددين',
    'single': 'مستخدم واحد',
    'count': 'عدد محدد'
  };
  return types[type] || type;
}

function getUsersCountText(discount) {
  if (discount.targetType === 'all') return 'جميع المستخدمين';
  if (discount.targetType === 'single') return 'مستخدم واحد';
  if (discount.targetType === 'count') return `${discount.maxUsers} مستخدم`;
  if (discount.targetType === 'specific') return `${discount.targetUsers?.length || 0} مستخدم`;
  return '-';
}

// ====== إدارة الخصومات ======
function editDiscount(discountId) {
  const discount = discounts.find(d => d.id === discountId);
  if (!discount) return;
  
  editingDiscountId = discountId;
  
  // تعبئة النموذج
  document.getElementById('discountCode').value = discount.code;
  document.getElementById('discountName').value = discount.name;
  document.getElementById('discountType').value = discount.type;
  document.getElementById('targetType').value = discount.targetType;
  document.getElementById('productScope').value = discount.productScope || 'all';
  document.getElementById('discountDescription').value = discount.description || '';
  document.getElementById('isActive').checked = discount.isActive;
  
  if (discount.percentage) {
    document.getElementById('discountPercentage').value = discount.percentage;
  }
  if (discount.amount) {
    document.getElementById('discountAmount').value = discount.amount;
  }
  if (discount.balanceAmount) {
    document.getElementById('balanceAmount').value = discount.balanceAmount;
  }
  
  document.getElementById('minPurchase').value = discount.minPurchase || 0;
  document.getElementById('maxUses').value = discount.maxUses || '';
  
  if (discount.startDate) {
    document.getElementById('startDate').value = discount.startDate;
  }
  if (discount.expiryDate) {
    document.getElementById('expiryDate').value = discount.expiryDate;
  }
  
  // تفعيل الحقول المناسبة
  toggleDiscountFields();
  toggleUsersSelection();
  
  // اختيار المستخدمين المحددين
  if (discount.targetType === 'specific' && discount.targetUsers) {
    setTimeout(() => {
      discount.targetUsers.forEach(email => {
        const checkbox = document.getElementById(`user_${email}`);
        if (checkbox) checkbox.checked = true;
      });
    }, 100);
  }
  
  if (discount.targetType === 'count' && discount.maxUsers) {
    document.getElementById('userCount').value = discount.maxUsers;
  }
  
  // الانتقال لقسم الإنشاء
  showSection('create');
  
  showMessage('جاري تحميل بيانات الخصم للتعديل', 'info');
}

function toggleDiscount(discountId) {
  const discount = discounts.find(d => d.id === discountId);
  if (!discount) return;
  
  discount.isActive = !discount.isActive;
  localStorage.setItem(DISCOUNTS_KEY, JSON.stringify(discounts));
  renderDiscountsList();
  
  showMessage(`تم ${discount.isActive ? 'تفعيل' : 'تعطيل'} الخصم`, 'success');
}

function deleteDiscount(discountId) {
  if (!confirm('هل أنت متأكد من حذف هذا الخصم؟ لا يمكن التراجع عن هذا الإجراء.')) {
    return;
  }
  
  discounts = discounts.filter(d => d.id !== discountId);
  localStorage.setItem(DISCOUNTS_KEY, JSON.stringify(discounts));
  renderDiscountsList();
  
  showMessage('تم حذف الخصم', 'success');
}

function viewDiscountDetails(discountId) {
  const discount = discounts.find(d => d.id === discountId);
  if (!discount) return;
  
  const details = document.getElementById('discountDetails');
  const isExpired = discount.expiryDate && new Date(discount.expiryDate) < new Date();
  
  let valueText = '';
  if (discount.type === 'percentage') {
    valueText = `نسبة ${discount.percentage}%`;
  } else if (discount.type === 'fixed') {
    valueText = `مبلغ ${discount.amount} ر.س`;
  } else if (discount.type === 'balance') {
    valueText = `رصيد إضافي ${discount.balanceAmount} ر.س`;
  } else if (discount.type === 'free_shipping') {
    valueText = 'شحن مجاني';
  }
  
  details.innerHTML = `
    <div style="display: grid; gap: 15px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div style="font-size: 1.2em; font-weight: 700; color: var(--netflix-white);">${discount.code}</div>
        <div style="padding: 5px 10px; border-radius: 12px; background: ${discount.isActive && !isExpired ? 'rgba(76, 175, 80, 0.2)' : 'rgba(244, 67, 54, 0.2)'}; color: ${discount.isActive && !isExpired ? 'var(--success-green)' : 'var(--error-red)'}; font-size: 0.9em;">
          ${discount.isActive && !isExpired ? 'نشط' : isExpired ? 'منتهي' : 'غير مفعل'}
        </div>
      </div>
      
      <div>
        <div style="color: var(--netflix-light-gray); font-size: 0.9em;">الاسم</div>
        <div style="color: var(--netflix-white); font-size: 1.1em; font-weight: 600;">${discount.name}</div>
      </div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
          <div style="color: var(--netflix-light-gray); font-size: 0.9em;">القيمة</div>
          <div style="color: var(--success-green); font-size: 1.1em; font-weight: 600;">${valueText}</div>
        </div>
        
        <div>
          <div style="color: var(--netflix-light-gray); font-size: 0.9em;">الفئة المستهدفة</div>
          <div style="color: var(--netflix-white); font-size: 1.1em; font-weight: 600;">${getTargetTypeText(discount.targetType)}</div>
        </div>
      </div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
          <div style="color: var(--netflix-light-gray); font-size: 0.9em;">الحد الأدنى للشراء</div>
          <div style="color: var(--netflix-white); font-size: 1.1em; font-weight: 600;">${discount.minPurchase || 0} ر.س</div>
        </div>
        
        <div>
          <div style="color: var(--netflix-light-gray); font-size: 0.9em;">مرات الاستخدام</div>
          <div style="color: var(--netflix-white); font-size: 1.1em; font-weight: 600;">${discount.usedCount || 0} / ${discount.maxUses || 'غير محدود'}</div>
        </div>
      </div>
      
      ${discount.startDate || discount.expiryDate ? `
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        ${discount.startDate ? `
        <div>
          <div style="color: var(--netflix-light-gray); font-size: 0.9em;">تاريخ البدء</div>
          <div style="color: var(--netflix-white); font-size: 1.1em; font-weight: 600;">${formatDate(discount.startDate)}</div>
        </div>
        ` : ''}
        
        ${discount.expiryDate ? `
        <div>
          <div style="color: var(--netflix-light-gray); font-size: 0.9em;">تاريخ الانتهاء</div>
          <div style="color: ${isExpired ? 'var(--error-red)' : 'var(--netflix-white)'}; font-size: 1.1em; font-weight: 600;">${formatDate(discount.expiryDate)}</div>
        </div>
        ` : ''}
      </div>
      ` : ''}
      
      <div>
        <div style="color: var(--netflix-light-gray); font-size: 0.9em;">الوصف</div>
        <div style="color: var(--netflix-white); font-size: 1em; line-height: 1.5; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;">
          ${discount.description || 'لا يوجد وصف'}
        </div>
      </div>
      
      ${discount.targetUsers ? `
      <div>
        <div style="color: var(--netflix-light-gray); font-size: 0.9em;">المستخدمون المصرح لهم</div>
        <div style="margin-top: 10px; max-height: 150px; overflow-y: auto;">
          ${discount.targetUsers.map(email => `
            <div style="padding: 8px; background: rgba(255,255,255,0.05); border-radius: 5px; margin-bottom: 5px; color: var(--netflix-white); font-size: 0.9em;">
              <i class="fas fa-user" style="margin-left: 8px;"></i> ${email}
            </div>
          `).join('')}
        </div>
      </div>
      ` : ''}
      
      <div>
        <div style="color: var(--netflix-light-gray); font-size: 0.9em;">تاريخ الإنشاء</div>
        <div style="color: var(--netflix-white); font-size: 1em;">${formatDate(discount.createdAt)}</div>
      </div>
    </div>
    
    <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px;">
      <button class="btn btn-secondary" onclick="closeDetailsModal()" style="flex: 1;">
        <i class="fas fa-times"></i> إغلاق
      </button>
      <button class="btn btn-primary" onclick="editDiscount('${discount.id}')" style="flex: 1;">
        <i class="fas fa-edit"></i> تعديل
      </button>
    </div>
  `;
  
  document.getElementById('detailsModal').style.display = 'flex';
}

function closeDetailsModal() {
  document.getElementById('detailsModal').style.display = 'none';
}

function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
}

function formatDate(dateString) {
  const date = new Date(dateString);
  return date.toLocaleDateString('ar-SA', {
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });
}

// ====== الإحصائيات ======
function updateStats() {
  const total = discounts.length;
  const active = discounts.filter(d => d.isActive && (!d.expiryDate || new Date(d.expiryDate) >= new Date())).length;
  const expired = discounts.filter(d => d.expiryDate && new Date(d.expiryDate) < new Date()).length;
  const totalUses = discounts.reduce((sum, d) => sum + (d.usedCount || 0), 0);
  
  document.getElementById('totalDiscounts').textContent = total;
  document.getElementById('activeDiscounts').textContent = active;
  document.getElementById('expiredDiscounts').textContent = expired;
  document.getElementById('totalUses').textContent = totalUses;
  
  // عرض الخصومات الأكثر استخداماً
  const topDiscounts = [...discounts]
    .sort((a, b) => (b.usedCount || 0) - (a.usedCount || 0))
    .slice(0, 5);
  
  const topContainer = document.getElementById('topDiscounts');
  if (topDiscounts.length === 0) {
    topContainer.innerHTML = `
      <div style="text-align: center; padding: 30px; color: var(--netflix-light-gray);">
        <i class="fas fa-chart-line" style="font-size: 36px; margin-bottom: 10px; opacity: 0.5;"></i>
        <p>لا توجد بيانات للإحصائيات</p>
      </div>
    `;
    return;
  }
  
  topContainer.innerHTML = `
    <div style="display: grid; gap: 15px;">
      ${topDiscounts.map((discount, index) => `
        <div style="display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px;">
          <div style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: linear-gradient(45deg, var(--netflix-red), #ff416c); color: white; border-radius: 10px; font-weight: 700; font-size: 1.2em;">
            ${index + 1}
          </div>
          <div style="flex: 1;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
              <div style="font-weight: 600; color: var(--netflix-white);">${discount.code}</div>
              <div style="color: var(--success-green); font-weight: 700;">${discount.usedCount || 0} مرة</div>
            </div>
            <div style="color: var(--netflix-light-gray); font-size: 0.9em;">${discount.name}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// ====== التهيئة ======
function initializePage() {
  // تحميل المستخدمين
  allUsers = JSON.parse(localStorage.getItem('registered_users') || '[]');
  
  // تحميل الخصومات
  discounts = JSON.parse(localStorage.getItem(DISCOUNTS_KEY)) || [];
  
  // عرض القسم الأول
  showSection('create');
  
  // تحديث الإحصائيات
  updateStats();
}

// تشغيل التهيئة عند تحميل الصفحة
document.addEventListener('DOMContentLoaded', initializePage);
</script>
</body>
</html>
